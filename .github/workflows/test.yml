name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (requires-python>=3.10) + what publish.yml gates on.
        python-version: ["3.10", "3.12"]
    env:
      # Belt-and-suspenders: with the `secure` extra installed, keyring is
      # present and a runner that happens to have dbus/Secret Service could
      # otherwise leak a real entry into the "no key" baseline tests. The null
      # backend guarantees keyring returns nothing. The tests are also hermetic
      # on their own (test_cli stubs _keyring_get), so this is defence in depth.
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev + secure (install-tests the keyring extra)
        run: pip install -e ".[dev,secure]"

      - name: pytest
        # Unit suite only; `integration`-marked tests (live API) are not run in CI.
        run: pytest -q -m "not integration"
